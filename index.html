<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speedy Monkes V2 Events</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f7f7; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #222; color: #fff; }
  h1 { margin: 0; font-size: 24px; }
  #adminPanel { display: none; }
  button { padding: 8px 12px; margin: 5px; cursor: pointer; }
  #events { padding: 20px; }
  .event { background: #fff; padding: 10px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
  #addEventForm { display: none; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <h1>Speedy Monkes V2 Events</h1>
  <div id="adminPanel">
    <button onclick="toggleAddEventForm()">Add Event</button>
    <button onclick="logoutAdmin()">Logout</button>
  </div>
</header>

<div id="events"></div>

<div id="addEventForm">
  <input type="text" id="eventName" placeholder="Event Name">
  <input type="datetime-local" id="eventDate">
  <button onclick="addEvent()">Save Event</button>
</div>

<script>
// For demo purposes, a simple admin login
let isAdmin = false;

function showAdminPanel() {
  if (isAdmin) {
    document.getElementById('adminPanel').style.display = 'block';
  }
}

function toggleAddEventForm() {
  const form = document.getElementById('addEventForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

// Add event function
function addEvent() {
  const name = document.getElementById('eventName').value;
  const date = document.getElementById('eventDate').value;
  if (!name || !date) {
    alert('Please enter event name and date');
    return;
  }

  const eventsDiv = document.getElementById('events');
  const eventEl = document.createElement('div');
  eventEl.className = 'event';
  eventEl.innerHTML = `<strong>${name}</strong><br>${new Date(date).toLocaleString()}`;
  eventsDiv.appendChild(eventEl);

  document.getElementById('eventName').value = '';
  document.getElementById('eventDate').value = '';
  toggleAddEventForm();
}

// Simple login simulation
function loginAdmin() {
  const password = prompt('Enter admin password:');
  if (password === 'admin123') { // change this to your secure password
    isAdmin = true;
    showAdminPanel();
  } else {
    alert('Wrong password');
  }
}

function logoutAdmin() {
  isAdmin = false;
  document.getElementById('adminPanel').style.display = 'none';
}

// Optional: prompt for admin login on page load
loginAdmin();
</script>

</body>
</html>
