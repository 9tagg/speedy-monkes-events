<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speedy Monkes Event Hub</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:#1e293b;
}

#adminBtn {
  background:#3b82f6;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

#adminPanel {
  display:none;
  position:absolute;
  right:20px;
  top:60px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#334155;
  color:white;
  border:none;
  border-radius:8px;
}

button {
  padding:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#loginPopup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popupContent {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

</style>
</head>

<body>

<header>
  <h2>Speedy Monkes Event Hub</h2>
  <div style="position:relative;">
    <span id="adminBtn" onclick="openLogin()">Admin</span>
    <div id="adminPanel">
      <button onclick="toggleAddEvent()">Add Event</button>
      <button onclick="toggleAddNews()">Add News</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="loginPopup">
  <div class="popupContent">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="closeLogin()">Cancel</button>
  </div>
</div>

<div class="container">

<!-- DESCRIPTION -->
<div class="card" style="text-align:center;">
Welcome to Speedy Monkes Event Hub! Here you can find all the upcoming events and news about speedy monkes!
</div>

<!-- ADD NEWS -->
<div class="card" id="addNewsCard" style="display:none;">
<input id="newsTitle" placeholder="News Title">
<textarea id="newsContent" placeholder="News Content"></textarea>
<button onclick="addNews()">Post News</button>
</div>

<div id="news"></div>

<!-- ADD EVENT -->
<div class="card" id="addEventCard" style="display:none;">
<input id="name" placeholder="Event Name">
<input id="time" type="datetime-local">
<button onclick="addEvent()">Add Event</button>
</div>

<div id="events"></div>

</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDk2budp6cyBlqa1lWJUfkHPWvmyNRAJNo",
  authDomain: "speedy-monkes-events.firebaseapp.com",
  projectId: "speedy-monkes-events",
  storageBucket: "speedy-monkes-events.firebasestorage.app",
  messagingSenderId: "625005948158",
  appId: "1:625005948158:web:e2b5b3e88ba10ba87909af",
  measurementId: "G-FFQVBRJPN4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const eventsRef = collection(db, "events");
const newsRef = collection(db, "news");

let loggedIn = false;

window.openLogin = () => loginPopup.style.display="flex";
window.closeLogin = () => loginPopup.style.display="none";

window.login = () => {
  if(user.value==="alexliammaybegojo" && pass.value==="alloncrackFRFR!"){
    loggedIn=true;
    closeLogin();
    adminPanel.style.display="block";
  } else alert("Wrong login");
};

window.logout = () => {
  loggedIn=false;
  adminPanel.style.display="none";
};

window.toggleAddEvent = () => {
  addEventCard.style.display = addEventCard.style.display==="none"?"block":"none";
};

window.toggleAddNews = () => {
  addNewsCard.style.display = addNewsCard.style.display==="none"?"block":"none";
};

window.addEvent = async () => {
  if(!name.value || !time.value) return;
  await addDoc(eventsRef, { name:name.value, time:time.value });
  name.value=""; time.value="";
};

window.deleteEvent = async (id) => {
  await deleteDoc(doc(db,"events",id));
};

window.addNews = async () => {
  if(!newsTitle.value || !newsContent.value) return;
  await addDoc(newsRef, {
    title:newsTitle.value,
    content:newsContent.value,
    date:new Date()
  });
  newsTitle.value=""; newsContent.value="";
};

window.deleteNews = async (id) => {
  await deleteDoc(doc(db,"news",id));
};

onSnapshot(eventsRef, snap => {
  events.innerHTML="";
  snap.forEach(docSnap => {
    const e = docSnap.data();
    const id = docSnap.id;

    events.innerHTML += `
      <div class="card">
        <b>${e.name}</b><br>
        ${new Date(e.time).toLocaleString()}
        ${loggedIn ? `<button onclick="deleteEvent('${id}')">Delete</button>` : ""}
      </div>
    `;
  });
});

onSnapshot(newsRef, snap => {
  news.innerHTML="";
  snap.forEach(docSnap => {
    const n = docSnap.data();
    const id = docSnap.id;

    news.innerHTML += `
      <div class="card">
        <b>${n.title}</b><br>
        <p>${n.content}</p>
        ${loggedIn ? `<button onclick="deleteNews('${id}')">Delete</button>` : ""}
      </div>
    `;
  });
});
</script>

</body>
</html>
