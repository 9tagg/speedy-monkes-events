<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speedy Monkes V2 Events</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  margin-top: 15px;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}

input {
  background: #334155;
  color: white;
}

button {
  background: #3b82f6;
  color: white;
}

button:hover {
  background: #2563eb;
}

.delete {
  background: #ef4444;
}

.delete:hover {
  background: #dc2626;
}

.countdown {
  color: #22d3ee;
}

.now {
  color: #f87171;
  font-weight: bold;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1> Speedy Monkes V2 Events</h1>

<!-- LOGIN -->
<div class="card" id="login">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card" id="admin" style="display:none;">
  <h3>Create Event</h3>
  <input id="name" placeholder="Event Name">
  <input id="time" type="datetime-local">
  <button onclick="addEvent()">Add Event</button>
</div>

<!-- EVENTS -->
<div id="events"></div>

</div>

<script>
const ADMINS = [
  { user: "liamw", pass: "hesoncrackaroni" },
  { user: "alex", pass: "evenTS?MINE!YAY!" }
];

let events = JSON.parse(localStorage.getItem("events") || "[]");
let loggedIn = false;

function login() {
  const u = user.value;
  const p = pass.value;

  if (ADMINS.find(a => a.user === u && a.pass === p)) {
    loggedIn = true;
    admin.style.display = "block";
    alert("Logged in");
    render();
  } else {
    alert("Wrong login");
  }
}

function addEvent() {
  if (!name.value || !time.value) return;

  events.push({
    id: Date.now(),
    name: name.value,
    time: time.value
  });

  save();
  render();
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  save();
  render();
}

function save() {
  localStorage.setItem("events", JSON.stringify(events));
}

function getCountdown(t) {
  const diff = new Date(t) - new Date();
  if (diff <= 0) return "Started";

  const d = Math.floor(diff / 86400000);
  const h = Math.floor(diff / 3600000) % 24;
  const m = Math.floor(diff / 60000) % 60;

  return `${d}d ${h}h ${m}m`;
}

function isNow(t) {
  return Math.abs(new Date() - new Date(t)) < 60000;
}

function render() {
  const container = document.getElementById("events");
  container.innerHTML = "";

  const grouped = {};
  events.forEach(e => {
    const date = new Date(e.time).toDateString();
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(e);
  });

  for (let date in grouped) {
    const section = document.createElement("div");
    section.className = "card";

    section.innerHTML = `<h3>${date}</h3>`;

    grouped[date].forEach(e => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${e.name}</b><br>
        ${new Date(e.time).toLocaleTimeString()}<br>
        <div class="countdown">Starts in: ${getCountdown(e.time)}</div>
        ${isNow(e.time) ? `<div class="now">Event Happening Now! Check announcements in Discord for the code!</div>` : ""}
        ${loggedIn ? `<button class="delete" onclick="deleteEvent(${e.id})">Delete</button>` : ""}
      `;

      section.appendChild(div);
    });

    container.appendChild(section);
  }
}

setInterval(render, 1000);
render();
</script>

</body>
</html>
